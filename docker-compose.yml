services:
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d tuchka"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: tuchka
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrations:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
      migrate -path=/migrations \
      -database postgres://appuser:${DB_PASSWORD}@db:5432/tuchka?sslmode=disable up
      "

  app:
    build: 
      context: .
      args:
        - VERSION=${VERSION:-}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      CONFIG_PATH: ${CONFIG_PATH}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}

volumes:
  pgdata: